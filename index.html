<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HZDV</title>
  <link rel="stylesheet" href="lib/vendor/ag-grid/ag-grid.min.css" />
  <link rel="stylesheet" href="lib/vendor/ag-grid/ag-theme-quartz.min.css" />
  <link rel="stylesheet" href="lib/vendor/ag-grid/agGridQuartzFont.min.css" />
  <link rel="stylesheet" href="lib/user/login.css" />
  <link rel="stylesheet" href="lib/user/login-extra.css" />
  <link rel="stylesheet" href="lib/user/hero-background.css?v=20260722h" />
  <link rel="stylesheet" href="lib/user/hero-background-admin.css?v=20260722h" />
  <style>
    :root {
      --nav-bg: #3d6a96;
      --nav-text: #ffffff;
      --nav-height: 64px;
      --dropdown-bg: #ffffff;
      --dropdown-text: #1a1a1a;
      --dropdown-hover: #f2f5f8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
        "Noto Sans SC", sans-serif;
      background: #0a0f14;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .site-header {
      height: var(--nav-height);
      color: var(--nav-text);
    }

    .nav {
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      border-radius: 8px;
      color: var(--nav-text);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.04em;
      opacity: 0.9;
      flex-shrink: 0;
      margin-right: auto;
    }

    .logo:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--nav-text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 400;
      white-space: nowrap;
      opacity: 0.92;
      transition: opacity 0.15s ease;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--nav-text);
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .menu-toggle:hover,
    .menu-toggle[aria-expanded="true"] {
      background: rgba(255, 255, 255, 0.12);
    }

    .menu-toggle span {
      display: block;
      width: 100%;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .menu-toggle[aria-expanded="true"] span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .lang-wrap {
      position: relative;
    }

    .auth-wrap {
      position: relative;
    }

    .auth-trigger {
      border: none;
      background: transparent;
      cursor: pointer;
      font: inherit;
      padding: 0;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--nav-text);
      cursor: pointer;
      border-radius: 4px;
    }

    .icon-btn:hover,
    .icon-btn[aria-expanded="true"] {
      background: rgba(255, 255, 255, 0.12);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .login-link {
      color: var(--nav-text);
      text-decoration: none;
      font-size: 15px;
      white-space: nowrap;
      opacity: 0.92;
    }

    .login-link:hover {
      opacity: 1;
    }

    .ops-nav-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      font: inherit;
      padding: 0;
    }

    .ops-wrap {
      position: relative;
    }

    .ops-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 140px;
      padding: 6px 0;
      background: var(--dropdown-bg);
      color: var(--dropdown-text);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      list-style: none;
      display: none;
      overflow: hidden;
      z-index: 1001;
    }

    .ops-dropdown.open {
      display: block;
    }

    .ops-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .ops-dropdown button:hover {
      background: var(--dropdown-hover);
    }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 120px;
      padding: 6px 0;
      background: var(--dropdown-bg);
      color: var(--dropdown-text);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      list-style: none;
      display: none;
      overflow: hidden;
    }

    .lang-dropdown.open {
      display: block;
    }

    .auth-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 120px;
      padding: 6px 0;
      background: var(--dropdown-bg);
      color: var(--dropdown-text);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      list-style: none;
      display: none;
      overflow: hidden;
      z-index: 1001;
    }

    .auth-dropdown.open {
      display: block;
    }

    .auth-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .auth-dropdown button:hover {
      background: var(--dropdown-hover);
    }

    .lang-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .lang-dropdown button:hover,
    .lang-dropdown button.active {
      background: var(--dropdown-hover);
    }

    .lang-dropdown button.active {
      font-weight: 600;
    }

    main.site-content {
      padding: 48px 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    main.site-content h1 {
      font-size: 2rem;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .nav {
        padding: 0 16px;
        gap: 16px;
        position: relative;
      }

      .logo {
        margin-right: auto;
      }

      .menu-toggle {
        display: flex;
      }

      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-height);
        left: 0;
        right: 0;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 8px 0;
        background: var(--nav-bg);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links li {
        width: 100%;
      }

      .nav-links a {
        display: block;
        padding: 14px 20px;
      }

      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>
<body>
  <header class="site-header site-header--overlay">
    <nav class="nav" aria-label="Main">
      <a class="logo" href="#" data-i18n="logo" aria-label="Logo">LOGO</a>

      <ul class="nav-links" id="nav-links">
        <li><a href="#" data-i18n="products"></a></li>
        <li><a href="#" data-i18n="news"></a></li>
        <li><a href="#" data-i18n="about_us"></a></li>
        <li><a href="#" data-i18n="contact"></a></li>
      </ul>

      <div class="nav-actions">
        <div class="ops-wrap auth-menu-ops" id="ops-wrap" hidden>
          <button
            type="button"
            class="login-link ops-nav-btn"
            id="topNavSystemOps"
            data-i18n="auth_ops"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="ops-menu"
          >系统运维</button>
          <ul class="ops-dropdown" id="ops-menu" role="menu">
            <li role="none">
              <button
                type="button"
                role="menuitem"
                id="topNavUserList"
                data-i18n="ops_user_list"
              >用户列表</button>
            </li>
            <li role="none">
              <button
                type="button"
                role="menuitem"
                id="topNavHeroBackground"
                data-i18n="ops_hero_background"
              >网站背景</button>
            </li>
          </ul>
        </div>

        <div class="lang-wrap">
          <button
            type="button"
            class="icon-btn"
            id="lang-toggle"
            aria-label="Language"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M3 12h18" />
              <path d="M12 3a14 14 0 0 1 0 18" />
              <path d="M12 3a14 14 0 0 0 0 18" />
              <path d="M4.5 7.5h15" />
              <path d="M4.5 16.5h15" />
            </svg>
          </button>
          <ul class="lang-dropdown" id="lang-menu" role="listbox">
            <li role="option">
              <button type="button" data-lang="zh">中文</button>
            </li>
            <li role="option">
              <button type="button" data-lang="en">English</button>
            </li>
          </ul>
        </div>

        <div class="auth-wrap">
          <button
            type="button"
            class="login-link auth-trigger"
            id="topNavUserLogin"
            data-i18n="login"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="auth-menu"
          >登录</button>
          <ul class="auth-dropdown" id="auth-menu" role="menu">
            <li role="none" class="auth-menu-guest">
              <button type="button" role="menuitem" data-auth="register" data-i18n="auth_register">注册</button>
            </li>
            <li role="none" class="auth-menu-guest">
              <button type="button" role="menuitem" data-auth="login" data-i18n="auth_login_item">登录</button>
            </li>
            <li role="none" class="auth-menu-user" hidden>
              <button type="button" role="menuitem" data-auth="logout" data-i18n="auth_logout">退出</button>
            </li>
          </ul>
        </div>

        <button
          type="button"
          class="menu-toggle"
          id="menu-toggle"
          aria-label="Menu"
          aria-controls="nav-links"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>
  </header>

  <nav class="user-admin-nav" id="userAdminNav" hidden aria-label="Admin"></nav>

  <div hidden aria-hidden="true">
    <button type="button" id="topRegisterBtn"></button>
    <div id="topAuthDropdown"></div>
    <div id="topAuthHover"></div>
    <button type="button" id="topNavAvatarManage"></button>
    <button type="button" id="topNavNewRegister">新人注册</button>
  </div>

  <section class="site-hero" id="site-hero" aria-label="Hero">
    <div class="site-hero__media" id="hero-media"></div>
    <div class="site-hero__overlay" aria-hidden="true"></div>
    <div class="site-hero__content">
      <h1 class="site-hero__title" id="hero-title" hidden></h1>
      <p class="site-hero__subtitle" id="hero-subtitle" hidden></p>
      <div class="site-hero__cta" id="hero-cta" hidden></div>
    </div>
    <div class="site-hero__dots" id="hero-dots" hidden></div>
  </section>

  <main class="site-content" id="site-content" hidden aria-hidden="true"></main>

  <script>
    const translations = {
      zh: {
        logo: "LOGO",
        products: "产品",
        news: "新闻与活动",
        about_us: "了解我们",
        contact: "联系我们",
        login: "登录",
        auth_register: "注册",
        auth_login_item: "登录",
        auth_logout: "退出",
        auth_ops: "系统运维",
        ops_user_list: "用户列表",
        ops_hero_background: "网站背景",
      },
      en: {
        logo: "LOGO",
        products: "Products",
        news: "News & Activity",
        about_us: "About DV",
        contact: "Contact Us",
        login: "Login",
        auth_register: "Register",
        auth_login_item: "Login",
        auth_logout: "Log out",
        auth_ops: "System Ops",
        ops_user_list: "User List",
        ops_hero_background: "Site Background",
      },
    };

    let currentLang = "zh";

    const langToggle = document.getElementById("lang-toggle");
    const langMenu = document.getElementById("lang-menu");
    const authToggle = document.getElementById("topNavUserLogin");
    const authMenu = document.getElementById("auth-menu");
    const opsToggle = document.getElementById("topNavSystemOps");
    const opsMenu = document.getElementById("ops-menu");
    const opsWrap = document.getElementById("ops-wrap");
    const menuToggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");

    function isLoggedIn() {
      try {
        return localStorage.getItem("leng_logged_in") === "1";
      } catch (e) {
        return false;
      }
    }

    function syncAuthMenuMode() {
      const loggedIn = isLoggedIn();
      authMenu.querySelectorAll(".auth-menu-guest").forEach((el) => {
        el.hidden = loggedIn;
      });
      authMenu.querySelectorAll(".auth-menu-user").forEach((el) => {
        el.hidden = !loggedIn;
      });
      if (typeof window.syncOpsMenuVisibility === "function") {
        window.syncOpsMenuVisibility();
      } else if (opsWrap) {
        opsWrap.hidden = true;
      }
    }

    function applyLanguage(lang) {
      currentLang = lang;
      const dict = translations[lang];
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        if (el.id === "topNavUserLogin" && isLoggedIn()) {
          return;
        }
        const key = el.getAttribute("data-i18n");
        if (dict[key] != null) {
          el.textContent = dict[key];
        }
      });

      langMenu.querySelectorAll("[data-lang]").forEach((btn) => {
        btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
      });
      syncAuthMenuMode();
    }

    function closeLangMenu() {
      langMenu.classList.remove("open");
      langToggle.setAttribute("aria-expanded", "false");
    }

    function closeAuthMenu() {
      authMenu.classList.remove("open");
      authToggle.setAttribute("aria-expanded", "false");
    }

    function closeOpsMenu() {
      if (!opsMenu || !opsToggle) return;
      opsMenu.classList.remove("open");
      opsToggle.setAttribute("aria-expanded", "false");
    }

    function closeMobileMenu() {
      navLinks.classList.remove("open");
      menuToggle.setAttribute("aria-expanded", "false");
    }

    menuToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLangMenu();
      closeAuthMenu();
      closeOpsMenu();
      const open = navLinks.classList.toggle("open");
      menuToggle.setAttribute("aria-expanded", String(open));
    });

    navLinks.addEventListener("click", (e) => {
      if (e.target.closest("a")) closeMobileMenu();
    });

    langToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      closeMobileMenu();
      closeAuthMenu();
      closeOpsMenu();
      const open = langMenu.classList.toggle("open");
      langToggle.setAttribute("aria-expanded", String(open));
    });

    langMenu.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-lang]");
      if (!btn) return;
      applyLanguage(btn.getAttribute("data-lang"));
      closeLangMenu();
    });

    authToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLangMenu();
      closeOpsMenu();
      closeMobileMenu();
      const open = authMenu.classList.toggle("open");
      authToggle.setAttribute("aria-expanded", String(open));
    });

    if (opsToggle && opsMenu) {
      opsToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        closeLangMenu();
        closeAuthMenu();
        closeMobileMenu();
        if (typeof window.userHasOpsMenuAccess === "function" && !window.userHasOpsMenuAccess()) {
          return;
        }
        const open = opsMenu.classList.toggle("open");
        opsToggle.setAttribute("aria-expanded", String(open));
      });
      opsMenu.addEventListener("click", (e) => {
        if (e.target.closest("[role='menuitem']")) {
          closeOpsMenu();
        }
      });
    }

    authMenu.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-auth]");
      if (!btn) return;
      e.stopPropagation();
      closeAuthMenu();
      const action = btn.getAttribute("data-auth");
      if (action === "logout") {
        if (typeof window.clearProfileNavOnLogout === "function") {
          window.clearProfileNavOnLogout();
        } else {
          try {
            localStorage.removeItem("leng_logged_in");
          } catch (err) {}
          authToggle.textContent =
            (translations[currentLang] && translations[currentLang].login) || "登录";
          syncAuthMenuMode();
        }
        return;
      }
      if (!window.L_ENG_Register) return;
      if (action === "login") {
        window.L_ENG_Register.closeNew();
        if (typeof window.L_ENG_Register.openLoginFlow === "function") {
          window.L_ENG_Register.openLoginFlow();
        } else {
          window.L_ENG_Register.open();
        }
      } else if (action === "register") {
        window.L_ENG_Register.close();
        window.L_ENG_Register.openNew();
      }
    });

    window.syncAuthMenuMode = syncAuthMenuMode;

    document.addEventListener("click", () => {
      closeLangMenu();
      closeAuthMenu();
      closeOpsMenu();
      closeMobileMenu();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeLangMenu();
        closeAuthMenu();
        closeOpsMenu();
        closeMobileMenu();
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 768) closeMobileMenu();
    });

    applyLanguage(currentLang);
  </script>
  <script src="lib/user/config.js"></script>
  <script src="lib/user/hero-background.js?v=20260722i"></script>
  <script src="lib/user/app-stubs.js"></script>
  <script src="lib/vendor/ag-grid/ag-grid-community.min.js"></script>
  <script src="lib/user/login-shell.js"></script>
  <script src="lib/user/new-user-register.js"></script>
  <script src="lib/user/user-list-grid.js"></script>
  <script src="lib/user/user-list-modal.js"></script>
  <script src="lib/user/hero-background-admin-modal.js?v=20260722i"></script>
  <script src="lib/user/login.js"></script>
</body>
</html>
